name: Semantic Release

on:
  workflow_call:
    inputs:
      model:
        description: 'LiteLLM model to use for release analysis'
        required: false
        type: string
        default: 'gemini/gemini-3.1-flash-lite'
      dry_run:
        description: 'Dry run mode (do not commit/tag)'
        required: false
        type: boolean
        default: false
    secrets:
      RELEASE_TOKEN:
        required: true
      GEMINI_API_KEY:
        required: false
      ANTHROPIC_API_KEY:
        required: false
      OPENAI_API_KEY:
        required: false
  workflow_dispatch:
    inputs:
      model:
        description: 'LiteLLM model to use for release analysis'
        required: false
        type: string
        default: 'gemini/gemini-3.1-flash-lite'
      dry_run:
        description: 'Dry run mode (do not commit/tag)'
        required: false
        type: boolean
        default: true

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore: release')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install bumpver

      - name: Bootstrap Baseline Tag (v0.1.0)
        run: |
          if [ -z "$(git tag -l 'v*')" ]; then
            echo "No semver tags found. Creating baseline tag v0.1.0 at the root commit..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            ROOT_COMMIT=$(git rev-list --max-parents=0 HEAD | tail -n 1)
            git tag v0.1.0 $ROOT_COMMIT
            git push origin v0.1.0
            echo "CURRENT_VERSION=v0.1.0" >> "$GITHUB_ENV"
          else
            echo "Semver tags already exist. Skipping baseline creation."
            LATEST_TAG=$(git tag -l 'v*' --sort=-v:refname | head -n 1)
            echo "CURRENT_VERSION=$LATEST_TAG" >> "$GITHUB_ENV"
          fi

      - name: LLM Release Action
        id: llm_release
        uses: nosovj/llm-release-action@v1.4.0
        with:
          model: ${{ inputs.model }}
          dry_run: ${{ inputs.dry_run }}
          current_version: ${{ env.CURRENT_VERSION }}
          context_files: "VERSIONING.md"
          changelog_config: |
            developer:
              preset: developer
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Extract Version
        id: extract_version
        run: |
          # The action outputs next_version e.g. "v1.2.3". Strip 'v'.
          RAW_VERSION="${{ steps.llm_release.outputs.next_version }}"
          NEW_VERSION="${RAW_VERSION#v}"
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"
          
          echo "Will update to version: $NEW_VERSION"

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump Version
        if: ${{ !inputs.dry_run }}
        run: bumpver update --set-version ${{ env.NEW_VERSION }} --no-commit --ignore-vcs-tag

      - name: Extract Changelog
        run: |
          # The output is a JSON string. We write it to a file then parse it.
          echo '${{ steps.llm_release.outputs.changelogs }}' > changelogs.json
          jq -r '.developer.en' changelogs.json > CHANGELOG.md
          rm changelogs.json

      - name: Commit & Push
        if: ${{ !inputs.dry_run }}
        run: |
          git add -u
          git add CHANGELOG.md
          git commit -m "chore: release ${{ env.NEW_VERSION }}"
          git tag ${{ env.NEW_VERSION }}
          git push origin main --tags

      - name: Create Release
        if: ${{ !inputs.dry_run }}
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ env.NEW_VERSION }}
          name: Release ${{ env.NEW_VERSION }}
          bodyFile: "CHANGELOG.md"
          token: ${{ secrets.RELEASE_TOKEN != '' && secrets.RELEASE_TOKEN || github.token }}
